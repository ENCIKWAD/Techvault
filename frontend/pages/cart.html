<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - TechVault</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1><a href="index.html" style="text-decoration: none; color: inherit;">TechVault</a></h1>
            <ul id="nav-links"></ul>
        </div>
    </nav>

    <main class="container">
        <h2>Shopping Cart</h2>

        <section class="cart-items">
            <h3>Items in Cart</h3>
            <div id="cart-list"></div>
        </section>

        <section class="checkout">
            <h3>Checkout</h3>
            <div id="cart-total" class="total">Total: $0</div>

            <div class="payment-options">
                <h4>Payment Method (STRATEGY PATTERN)</h4>
                <label>
                    <input type="radio" name="payment" value="card" checked> Credit Card
                </label>
                <label>
                    <input type="radio" name="payment" value="cod"> Cash on Delivery
                </label>
            </div>

            <button id="checkout-btn" class="btn-primary">Proceed to Checkout</button>
        </section>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
